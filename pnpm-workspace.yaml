packages:
  - 'js'
  - 'js/app/*'
  - 'js/package/*'
  - 'mbt/package/*'
  - 'go/app/*'
  - 'nix'
  - 'elixir/*'

allowBuilds:
  esbuild: true
  msgpackr-extract: true
  sharp: true
  workerd: true

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.23
  vite-plus: ^0.1.23
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogs:
  auth:
    '@better-auth/oauth-provider': 1.6.12
    '@better-auth/passkey': 1.6.12
    better-auth: ^1.6.12
    casbin: ^5.39.0
    jose: ^6.2.3
  build:
    '@typescript/native-preview': 7.0.0-dev.20251117.1
    typescript: ^5.9.2
  cloudflare:
    '@cloudflare/vite-plugin': ^1.39.0
    wrangler: ^4.95.0
  database:
    '@libsql/kysely-libsql': ^0.4.1
    kysely: ^0.29.2
  dev:
    '@mikaelporttila/rss': npm:@jsr/mikaelporttila__rss@1.1.3
  effect:
    '@effect/platform-node': 4.0.0-beta.65
    effect: 4.0.0-beta.65
  graphql:
    '@pothos/core': ^4.12.0
    '@pothos/plugin-validation': ^4.3.0
    graphql: ^16.14.0
    graphql-scalars: ^1.25.0
  hono:
    '@hono/graphql-server': ^0.7.0
    '@hono/node-server': ^2.0.4
    hono: ^4.12.23
  i18n:
    '@inlang/paraglide-js': ^2.18.1
  lint:
    ultracite: ^7.8.0
  opencode:
    '@opencode-ai/sdk': ^1.15.12
  pulumi:
    '@pulumi/aws': ^7.0.0
    '@pulumi/awsx': ^3.0.0
    '@pulumi/cloudflare': ^6.5.0
    '@pulumi/pulumi': ^3.113.0
  remix:
    remix: 3.0.0-beta.2
  storybook:
    storybook: ^10.4.1
  types:
    '@types/node': ^25.9.1

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
patchedDependencies:
  '@better-auth/kysely-adapter@1.6.12': patches/@better-auth__kysely-adapter@1.6.12.patch

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
