packages:
  - 'js'
  - 'js/app/*'
  - 'js/package/*'
  - 'mbt/package/*'
  - 'go/app/*'

allowBuilds:
  esbuild: true
  msgpackr-extract: true
  sharp: true
  workerd: true

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogs:
  auth:
    better-auth: ^1.5.3
    casbin: ^5.39.0
  build:
    '@typescript/native-preview': 7.0.0-dev.20251117.1
    typescript: ^5.9.2
  cloudflare:
    '@cloudflare/vite-plugin': ^1.26.1
    wrangler: ^4.45.0
  database:
    '@libsql/kysely-libsql': ^0.4.1
    kysely: ^0.28.11
    kysely-codegen: ^0.19.0
  dev:
    '@mikaelporttila/rss': npm:@jsr/mikaelporttila__rss@1.1.3
  effect:
    '@effect/platform-node': beta
    effect: beta
  graphql:
    '@pothos/core': ^4.9.1
    '@pothos/plugin-validation': ^4.1.1
    graphql: ^16.11.0
    graphql-scalars: ^1.24.2
  hono:
    '@hono/graphql-server': ^0.7.0
    hono: ^4.12.6
  i18n:
    '@inlang/paraglide-js': ^2.13.1
  lint:
    eslint: ^9.37.0
    eslint-config-flat-gitignore: ^2.1.0
    eslint-plugin-react-hooks: ^7.0.0
    jiti: ^2.6.1
    typescript-eslint: ^8.46.1
    ultracite: ^7.0.0
  pulumi:
    '@pulumi/aws': ^7.0.0
    '@pulumi/awsx': ^3.0.0
    '@pulumi/cloudflare': ^6.5.0
    '@pulumi/pulumi': ^3.113.0
  react:
    '@tanstack/devtools-event-client': latest
    '@tanstack/devtools-vite': latest
    '@tanstack/query-db-collection': latest
    '@tanstack/react-db': latest
    '@tanstack/react-devtools': latest
    '@tanstack/react-form': latest
    '@tanstack/react-query': latest
    '@tanstack/react-query-devtools': latest
    '@tanstack/react-router': latest
    '@tanstack/react-router-devtools': latest
    '@tanstack/react-router-ssr-query': latest
    '@tanstack/react-start': latest
    '@tanstack/react-store': latest
    '@tanstack/router-cli': ^1.133.25
    '@tanstack/router-plugin': ^1.132.0
    '@tanstack/store': latest
    '@testing-library/dom': ^10.4.1
    '@testing-library/react': ^16.3.0
    '@types/react': ^19.2.2
    '@types/react-dom': ^19.2.2
    '@vitejs/plugin-react': ^5.1.4
    babel-plugin-react-compiler: ^1.0.0
    react: ^19.2.0
    react-dom: ^19.2.0
  storybook:
    '@storybook/react-vite': ^10.2.15
