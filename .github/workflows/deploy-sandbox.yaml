name: Deploy sandbox images

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/totto2727-org/monorepo

jobs:
  build-base:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
            id: amd64
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
            id: arm64
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/docker-build-by-digest
        with:
          context: ./sandbox
          file: ./sandbox/sandbox-base.Dockerfile
          image: ${{ env.IMAGE_PREFIX }}/sandbox-base
          platform: ${{ matrix.platform }}
          artifact-name: digests-base-${{ matrix.id }}
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  merge-base:
    needs: build-base
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/docker-merge-manifests
        with:
          image: ${{ env.IMAGE_PREFIX }}/sandbox-base
          artifact-pattern: digests-base-*
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  build-dev:
    needs: merge-base
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
            id: amd64
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
            id: arm64
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/docker-build-by-digest
        with:
          context: ./sandbox
          file: ./sandbox/sandbox-dev.Dockerfile
          image: ${{ env.IMAGE_PREFIX }}/sandbox-dev
          platform: ${{ matrix.platform }}
          artifact-name: digests-dev-${{ matrix.id }}
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  merge-dev:
    needs: build-dev
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/docker-merge-manifests
        with:
          image: ${{ env.IMAGE_PREFIX }}/sandbox-dev
          artifact-pattern: digests-dev-*
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  build-monorepo:
    needs: merge-dev
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
            id: amd64
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
            id: arm64
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/docker-build-by-digest
        with:
          context: ./sandbox
          file: ./sandbox/sandbox-monorepo.Dockerfile
          image: ${{ env.IMAGE_PREFIX }}/sandbox-monorepo
          platform: ${{ matrix.platform }}
          artifact-name: digests-monorepo-${{ matrix.id }}
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  merge-monorepo:
    needs: build-monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/docker-merge-manifests
        with:
          image: ${{ env.IMAGE_PREFIX }}/sandbox-monorepo
          artifact-pattern: digests-monorepo-*
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
