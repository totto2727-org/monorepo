name: Setup MoonBit
description: Install the MoonBit toolchain and update the registry.

runs:
  using: composite
  steps:
    - name: Install moonbit
      uses: hustcer/setup-moonbit@e9b0a3082767ae669bf7588992ae3ba9eac09baa # v1.19
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Update moonbit registry
      shell: bash
      run: moon update
