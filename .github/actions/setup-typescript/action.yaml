name: Setup TypeScript
description: Install workspace packages with Vite+ from the root Nix development shell.

inputs:
  install-args:
    description: |
      Extra arguments appended to `vp install`. Useful for narrowing the install graph
      to a single workspace and its dependencies, e.g. `--filter @totto2727/bw...`.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install packages
      shell: bash
      env:
        VP_INSTALL_ARGS: ${{ inputs.install-args }}
      run: |
        eval "$(nix print-dev-env "$GITHUB_WORKSPACE#default")"
        vp install $VP_INSTALL_ARGS
