  - id: U-3
    decision: '案 A 採用: `isFrameRequest(request: Request, frames)` に signature 変更し `remix-helper` を完全 Hono フリー化。consumer 側 (3 projects + hono-remix-v3-cloudflare-example) で `c.req.raw` を渡す adapter 追加が必要'
    decided_at: 2026-05-08T00:30:00Z
  - id: U-other-A
    decision: 'ManagedRuntime に Symbol.asyncDispose 未組込のため wrapper class パターン継承を必須化。`makeDisposableRuntime` factory が wrapper class を返す形式'
    decided_at: 2026-05-08T00:30:00Z
  - id: U-other-B
    decision: 'PageOrFrame web/IdP 未採用観測のため SC-6 達成は refactor only option A 採用 (3 consumer + example で routes.ts のみ更新、document.tsx の PageOrFrame 導入は本 cycle スコープ外)'
    decided_at: 2026-05-08T00:30:00Z
  - id: U-other-D
    decision: "frame name 型表現は **string literal union を generics 引数で直接受ける** 形 (`createFrameHelpers<T extends string>()`) に最終確定 (User 確定 2026-05-09 第 3 改訂)。型関数 `InferFrameName<T>` は廃止 (= consumer 側で `type FrameName = 'content'` のように union 型を直接定義し generics に渡す)。tuple / Record / 型関数いずれも不要、最もシンプルな形"
    decided_at: 2026-05-09T09:30:00Z
    superseded_decisions:
      - 'Pattern P2 (readonly string[] + T[number])'
      - 'Record<PropertyKey, string> + T[keyof T] (P1 寄り)'

step3_design_revisions:
  - revision_at: 2026-05-09T08:00:00Z
    trigger: 'User 指摘 4 件 (2026-05-09 1st round)'
    items:
      - id: R-1
        target: 'Env.Type'
        change: "struct `{ readonly ENV: ... }` → 直接 string literal union `'production' | 'development'` に simplify。`yield* Env.Service` 戻り値が文字列直接、consumer 側 `env.ENV` → `env`"
      - id: R-2
        target: 'dynamicLoggerLayer'
        change: 'library 側で `Layer.unwrap` / `Layer.provide(Env.layer)` を行うのは coding 規約違反。Env-open `Layer<never, never, Env.Type>` として export し、Env 依存 closure は consumer entry point の責務'
      - id: R-3
        target: 'dynamicLoggerLayer 内部実装'
        change: '`env.ts` import 維持。具体的 Effect 4.x API (Layer.unwrap 不使用) は Step 6 implementer が effect/dist/dts/ を引いて確定'
      - id: R-4
        target: 'createFrameHelpers / FrameHelpers / InferFrameName'
        change: '`frames: readonly string[]` 廃止 → `frames: Record<PropertyKey, string>` に変更。`T[number]` → `T[keyof T]`。U-other-D Pattern P2 撤回、Record + value union (P1 寄り) を採用 (この決定は R-5 で再撤回)'
        superseded_at: 2026-05-09T09:30:00Z
  - revision_at: 2026-05-09T09:30:00Z
    trigger: 'User 指摘 (2026-05-09 2nd round): Union で直接指定 + FrameLink を移植対象に追加'
    items:
      - id: R-5
        target: 'createFrameHelpers / FrameHelpers'
        change: "R-4 撤回。`Record<PropertyKey, string>` + `T[keyof T]` を廃止し、`<T extends string>` で string literal union を generics 引数で **直接受ける** 形に変更。型関数 `InferFrameName<T>` 廃止 (= 渡された `T` 自体が frame name union)。consumer は `type FrameName = 'content'` のように union 型を 1 行宣言して `createFrameHelpers<FrameName>()` で渡す形"
      - id: R-6
        target: 'FrameLink (新 candidate C-6)'
        change: 'FrameLink (`hono-remix-v3-cloudflare-example/app/ui/frame-link.tsx`) を本 cycle の移植対象に正式追加。`createFrameHelpers` の戻り値プロパティ `helpers.FrameLink` として提供、`rmx-target` prop は `T` で型 specialize。既存 frame-link.tsx 削除 + library 経由 import に切替で migration 完了。`hono-remix-v3-cloudflare-example` の純減行数が +約 30 行 (約 72 → 約 102 行) に増加'

