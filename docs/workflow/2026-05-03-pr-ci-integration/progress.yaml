    notes: |
      Intent Spec を確定。スコープは dev-workflow/SKILL.md への 5 ルール追加
      (Draft PR / PR 概要更新 / バックグラウンド CI 確認 / 2 回リトライ → Blocker 化 /
      Step 9 完了後 Ready 化) + 本サイクル自身でのドッグフード実証。
      ユーザー承認時の補足: 「小規模なためこの後、最後まで確認なしで進めて良いです」
      → Step 2〜9 のユーザー承認ゲートは事前一括承認として扱う (Main 判定で進行)。
      Blocker / 重大なスコープ変更時のみ In-Progress 一時レポートで再確認。
      origin/main の大規模変更 (PR #94 = docs/dev-workflow/ → docs/workflow/ rename
      + roadmap 概念追加) を rebase で取り込み、サイクル作業ディレクトリを
      docs/workflow/2026-05-03-pr-ci-integration/ に移行済み。

  - step: 'Step 2 (Research)'
    completed_at: 2026-05-03T04:36:00Z
    artifacts:
      - research/gh-cli.md
      - research/ci-structure.md
      - research/integration-points.md
      - research/past-cycles.md
    notes: |
      4 並列 researcher 起動。Intent Spec の未解決 8 項目を全て解消できる範囲で
      事実関係を確定:
      - gh-cli: 推奨 CLI パターン (`gh pr edit --body-file`、`gh run rerun --failed`、
        `gh run watch --exit-status --interval 10 --compact`) と Specialist 権限境界
        (write 系は Main 専属、read 系は許容) を提示。
      - ci-structure: 必須 check は `check` ジョブ 1 つのみ、中央値 109s / p90 120s /
        最大 140s、flaky ゼロ。失敗の 100% は oxfmt Formatting。`gh pr checks --required`
        または「最新 SHA で実行された check の conclusion」が PASS 定義として最小。
      - integration-points: dev-workflow/SKILL.md (888 行) で PR/CI 既存言及はほぼゼロ。
        新セクション「サイクル PR と CI 連携プロトコル」を「ステップ完了時のコミット規約」
        直後に独立追加し、各 Step Exit Criteria に CI PASS 1 行追記する案を推奨。
        specialist-common §7 直後に Main 専属 1 行追加。
      - past-cycles: 過去 PR は Ready 即時作成 / description 編集 0 回 / blockers 未使用 /
        CI fix は新規 commit push が常套。git-workflow は触らず dev-workflow に閉じて
        書ける (改修不要)。PR description テンプレ骨子 (Summary / Cycle / Test plan /
        Notable / フッター) を抽出済み。

  - step: 'Step 3 (Design)'
    completed_at: 2026-05-03T04:50:00Z
    artifacts:
      - design.md
    notes: |
      architect 1 名で設計確定。新セクション「サイクル PR と CI 連携プロトコル」を
      dev-workflow/SKILL.md の「ステップ完了時のコミット規約」直後に独立追加する案を
      採用。各 Step Exit Criteria 末尾に統一文言で CI PASS 1 行追加 (9 箇所、Step 6 のみ
      タスク単位に微修正)。specialist-common §7 直後に「PR 操作は Main 専属」1 行追加。
      progress-yaml.md には schema 変更なしで blockers の CI failure 例 1〜2 行追記。
      CI リトライ手段は新規コミット push (本リポ flaky ゼロ + 失敗 100% が決定的事象の
      ため `gh run rerun` 不採用)。Ready 化は `gh pr view --json isDraft` 事前確認 →
      `gh pr ready` の二段構えで冪等。PR description は $TMPDIR で揮発管理し
      `gh pr edit --body-file` 経由で送信。Step 6 タスク数の見立て: 5 タスク (Wave 2
      段階)。プロジェクト横断 ADR 起票は不要 (サイクル内完結)。
      ユーザー事前一括承認のため Step 3 Gate も即時通過。

  - step: 'Step 4 (QA Design)'
    completed_at: 2026-05-03T04:58:00Z
    artifacts:
      - qa-design.md
      - qa-flow.md
    notes: |
      qa-analyst 1 名で本質テスト 22 件 (TC-001〜TC-022) を確定。SC-1〜SC-8
      すべてが 1 件以上の TC でカバー (合計 18 件 + 前提/リグレッション 4 件)。
      2 軸付与: 全 TC が automated × assertion または automated × scenario。
      禁止組み合わせ (automated × inspection) なし。qa-flow.md は 6 セクション
      (関心領域 5 + 横断的処理 1) で本質ロジック分岐図を構成し、各葉に TC-ID 付与。
      Step 8 Validator 実行コマンド見積り: 静的検証 ~12、動的検証 ~15-20、合計
      ~27-32。実装都合テスト (TC-IMPL-NNN) は空セクションのみ用意し Step 6
      implementer 追記対象。
      ユーザー事前一括承認のため Step 4 Gate も即時通過。

  - step: 'Step 5 (Task Decomposition)'
    completed_at: 2026-05-03T05:10:00Z
    artifacts:
      - task-plan.md
      - TODO.md
    notes: |
      planner 1 名で 5 タスク (T1-T5) を 3 Wave に再構成 (architect 暫定 2 Wave →
      ファイル衝突回避のため 3 Wave に再分配)。
      - Wave 1 (3 並列): T1 (M, SKILL.md 新セクション ~110 行) + T4 (S,
        specialist-common §7 1 行) + T5 (S, progress-yaml blockers 例)
      - Wave 2 (単独): T2 (S, SKILL.md Exit Criteria 9 箇所追記)
      - Wave 3 (単独): T3 (S, SKILL.md 参照リンク 1 行)
      T1/T2/T3 は同一ファイル (`dev-workflow/SKILL.md`) を編集するため Wave 跨ぎで
      直列化。T4 / T5 は別ファイルのため T1 と完全並列可。各タスクに TC-NNN
      紐付け済み (T1 = TC-001..007/022 等)。task-plan.md は不変運用、後発タスクは
      TODO.md 側で管理。Step 6 全体所要見積り: ~2.5-3.5 時間 (CI 待機含む)。
      ユーザー事前一括承認のため Step 5 Gate も即時通過。
      TODO.md を生成し全タスク `status: pending` で初期化。

  - step: 'Step 6 (Implementation)'
    completed_at: 2026-05-03T06:05:00Z
    artifacts:
