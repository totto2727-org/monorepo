  - step: 'Step 2 (Research)'
    completed_at: 2026-05-03T04:36:00Z
    artifacts:
      - research/gh-cli.md
      - research/ci-structure.md
      - research/integration-points.md
      - research/past-cycles.md
    notes: |
      4 並列 researcher 起動。Intent Spec の未解決 8 項目を全て解消できる範囲で
      事実関係を確定:
      - gh-cli: 推奨 CLI パターン (`gh pr edit --body-file`、`gh run rerun --failed`、
        `gh run watch --exit-status --interval 10 --compact`) と Specialist 権限境界
        (write 系は Main 専属、read 系は許容) を提示。
      - ci-structure: 必須 check は `check` ジョブ 1 つのみ、中央値 109s / p90 120s /
        最大 140s、flaky ゼロ。失敗の 100% は oxfmt Formatting。`gh pr checks --required`
        または「最新 SHA で実行された check の conclusion」が PASS 定義として最小。
      - integration-points: dev-workflow/SKILL.md (888 行) で PR/CI 既存言及はほぼゼロ。
        新セクション「サイクル PR と CI 連携プロトコル」を「ステップ完了時のコミット規約」
        直後に独立追加し、各 Step Exit Criteria に CI PASS 1 行追記する案を推奨。
        specialist-common §7 直後に Main 専属 1 行追加。
      - past-cycles: 過去 PR は Ready 即時作成 / description 編集 0 回 / blockers 未使用 /
        CI fix は新規 commit push が常套。git-workflow は触らず dev-workflow に閉じて
        書ける (改修不要)。PR description テンプレ骨子 (Summary / Cycle / Test plan /
        Notable / フッター) を抽出済み。

  - step: 'Step 3 (Design)'
    completed_at: 2026-05-03T04:50:00Z
    artifacts:
      - design.md
    notes: |
      architect 1 名で設計確定。新セクション「サイクル PR と CI 連携プロトコル」を
      dev-workflow/SKILL.md の「ステップ完了時のコミット規約」直後に独立追加する案を
      採用。各 Step Exit Criteria 末尾に統一文言で CI PASS 1 行追加 (9 箇所、Step 6 のみ
      タスク単位に微修正)。specialist-common §7 直後に「PR 操作は Main 専属」1 行追加。
      progress-yaml.md には schema 変更なしで blockers の CI failure 例 1〜2 行追記。
      CI リトライ手段は新規コミット push (本リポ flaky ゼロ + 失敗 100% が決定的事象の
      ため `gh run rerun` 不採用)。Ready 化は `gh pr view --json isDraft` 事前確認 →
      `gh pr ready` の二段構えで冪等。PR description は $TMPDIR で揮発管理し
      `gh pr edit --body-file` 経由で送信。Step 6 タスク数の見立て: 5 タスク (Wave 2
      段階)。プロジェクト横断 ADR 起票は不要 (サイクル内完結)。
      ユーザー事前一括承認のため Step 3 Gate も即時通過。

