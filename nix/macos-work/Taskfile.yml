version: '3'

tasks:
  default:
    cmds:
      - task --list-all

  init:podman:
    cmds:
      - |
        podman machine ssh --username root rm -f /etc/containers/registries.conf.d/000-shortnames.conf
        podman machine ssh --username root 'curl -L https://raw.githubusercontent.com/totto2727-dotfiles/chezmoi/refs/heads/main/dot_config/containers/registries.conf > /etc/containers/registries.conf'
        podman machine stop && podman machine start
        podman run --rm -it --device /dev/dri --name gpu-info quay.io/slopezpa/fedora-vgpu vulkaninfo

  init:plantuml:
    cmds:
      - podman run -d -p 8080:8080 --read-only plantuml/plantuml-server:jetty

  rebuild:
    deps:
      - format
    cmds:
      - sudo nix flake update --option access-tokens "github.com=$(gh auth token)"
      - sudo nix run nix-darwin -- switch --flake .

  format:
    cmds:
      - sudo nixfmt flake.nix
