version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    - /nix
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  nix:
    endpoints:
      - { host: cache.nixos.org, port: 443, access: read-only }
      - { host: api.github.com, port: 443, access: read-only }
      - { host: github.com, port: 443, access: read-only }
      - { host: codeload.github.com, port: 443, access: read-only }
    binaries:
      - path: '/nix/store/*/bin/nix'
      - path: '/nix/store/*/bin/devbox'
