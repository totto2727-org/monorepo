# Roadmap progress tracking yaml for `dev-roadmap`.
# Place this file at `docs/roadmap/<roadmap-id>/roadmap-progress.yaml`.
# See `share-artifacts/references/roadmap-progress-yaml.md` for authoring details.
#
# Design policy (minimal responsibility): only track "the link between milestones and workflow
# identifiers" along with coarse-grained statuses (planned / active / completed / blocked /
# cancelled). Do not hold finer-grained progress (current step name, gate state, detailed event
# history); when needed, traverse via `milestones[].workflow_identifiers[]` into each
# `docs/workflow/<identifier>/progress.yaml`.

roadmap_id: <roadmap-id> # Must match the docs/roadmap/<roadmap-id>/ directory name (required)
title: <short description> # Must match the title in roadmap.md (required)
status: planned # planned | active | completed (entire roadmap)
created_at: <ISO8601> # e.g. 2026-04-29T00:00:00Z (second precision)
updated_at: <ISO8601> # Rewrite to the latest ISO8601 on every update (second precision)

# List of milestones. Finalized by `roadmap-planner` in Step 2 (Milestone Decomposition).
# After finalization, `id` / `title` / `depends_on` are immutable (parallel workflow cycles during Step 3 must not touch them).
milestones:
  - id: <milestone-id> # kebab-case recommended (e.g. ms-01-foundation)
    title: <short description>
    status: planned # planned | active | completed | blocked | cancelled
    depends_on: [] # Array of milestone ids that must complete first (DAG)
    workflow_identifiers: [] # List of <identifier> values for linked dev-workflow cycles (1:N allowed, append-only)
    notes: null # Optional notes (default null)
